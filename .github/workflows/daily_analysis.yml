name: Daily News Analysis & Deployment

on:
  schedule:
    - cron: '0 3 * * *' # 3:00 AM UTC (8:30 AM IST)
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate Daily News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate_daily_news.js
        
      - name: Commit & Push news data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/news/
          git commit -m "chore: update daily news for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
          
      - name: Build Application
        run: npm run build
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_push: true


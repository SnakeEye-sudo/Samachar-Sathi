name: Complete Daily News Analysis for UPSC/BPSC

on:
  schedule:
    # Runs every day at 2:30 AM IST (9:00 PM UTC previous day)
    - cron: '0 21 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  comprehensive-news-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Generate Comprehensive Daily News Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/comprehensive_news_scraper.js
        
      - name: Commit News Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Samachar-Sathi Bot"
          git add public/news/
          git diff --quiet && git diff --staged --quiet || git commit -m "feat: daily comprehensive news analysis for $(date +'%Y-%m-%d')"
          git push
      
      - name: Build Application
        run: npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: ${{ secrets.CUSTOM_DOMAIN }}
          force_orphan: true
